// ===================== CHARACTER CLASS =====================
class Char{
  constructor(def,x,fr){
    this.def=def; this.x=x; this.y=GY;
    this.vx=0; this.vy=0; this.onGround=true;
    this.fr=fr; // facing right
    this.hp=100; this.maxHp=100;
    this.state='idle'; this.fi=0; this.ft=0; this.st=0;
    this.hitDone=false; this.inv=0; this.stun=0;
    this.img=new Image(); this.rdy=false;
    this.img.onload=()=>this.rdy=true;
    this.img.src=def.file;
    this.hitFlash=0;
  }
  get anim(){return this.def.anims[this.state]||this.def.anims.idle;}
  get frame(){return this.anim.f[Math.min(this.fi,this.anim.f.length-1)];}
  isAtk(){return !['idle','walk'].includes(this.state);}

  setState(s){
    if(this.state===s)return;
    this.state=s; this.fi=0; this.ft=0; this.st=0; this.hitDone=false;
  }

  update(dt, inp, opp){
    // Face opponent
    this.fr = this.x < opp.x;

    // Gravity
    if(!this.onGround){ this.vy+=GRAV*dt; }
    this.x+=this.vx*dt; this.y+=this.vy*dt;

    // Ground
    if(this.y>=GY){
      this.y=GY; this.vy=0; this.onGround=true;
      if(this.state==='jump') this.setState('idle');
    }
    // Bounds
    this.x=Math.max(60,Math.min(CW-60,this.x));

    // Timers
    this.inv=Math.max(0,this.inv-dt);
    this.stun=Math.max(0,this.stun-dt);
    this.hitFlash=Math.max(0,this.hitFlash-dt);
    this.st+=dt;

    // Input
    if(this.stun<=0 && this.hp>0){
      if(!this.isAtk()){
        if(inp.left){this.vx=-WALK; if(this.onGround)this.setState('walk');}
        else if(inp.right){this.vx=WALK; if(this.onGround)this.setState('walk');}
        else{
          this.vx=0;
          if(this.onGround&&this.state==='walk')this.setState('idle');
        }
        if(inp.up&&this.onGround){
          this.vy=JUMP_VY; this.onGround=false; this.setState('jump');
          inp.up=false;
        }
        const am=this.def.attackMap;
        for(const k of['a','b','c','d','x']){
          if(inp[k]){
            inp[k]=false;
            const s=am[k];
            if(s&&this.def.anims[s]){this.vx=0;this.setState(s);}
            break;
          }
        }
      } else {
        this.vx*=0.85; // decelerate during attack
      }
    } else if(this.stun>0){ this.vx*=0.7; }

    // Animate
    const a=this.anim;
    this.ft+=dt;
    const fd=1/a.fps;
    while(this.ft>=fd){
      this.ft-=fd; this.fi++;
      if(this.fi>=a.f.length){
        if(a.loop){ this.fi=0; }
        else{ this.fi=a.f.length-1; if(this.isAtk())this.setState('idle'); }
      }
    }
  }

  getAtkBox(){
    if(!this.isAtk()) return null;
    const a=this.anim;
    if(!a.atk) return null;
    // Active during middle frames
    const n=a.f.length;
    if(n>1&&(this.fi<1||this.fi>n-2)) return null;
    const {reach,oy,oh,dmg}=a.atk;
    const bx=this.fr?this.x:this.x-reach;
    return {x:bx,y:this.y+oy,w:reach,h:oh,dmg};
  }

  getBodyBox(){
    return {x:this.x-this.def.bw/2,y:this.y-this.def.bh,w:this.def.bw,h:this.def.bh};
  }

  hit(dmg){
    if(this.inv>0) return false;
    this.hp=Math.max(0,this.hp-dmg);
    this.inv=0.45; this.stun=0.22;
    this.hitFlash=0.12;
    return true;
  }

  draw(ctx){
    if(!this.rdy) return;
    const f=this.frame, sc=this.def.sc;
    const a=this.anim;
    let dw=f.w*sc, dh=f.h*sc;
    // Cap display size for wide attack frames so they don't flood the screen
    if(a.maxDW && dw>a.maxDW){ const r=a.maxDW/dw; dw=a.maxDW; dh*=r; }
    const dx=this.x-dw/2, dy=this.y-dh;
    ctx.save();
    if(!this.fr){
      ctx.translate(this.x*2,0);
      ctx.scale(-1,1);
    }
    if(this.hitFlash>0){
      ctx.filter='brightness(3) saturate(0)';
    }
    if(this.inv>0&&Math.floor(this.inv*10)%2===0){
      ctx.globalAlpha=0.4;
    }
    ctx.drawImage(this.img,f.x,f.y,f.w,f.h,dx,dy,dw,dh);
    ctx.restore();
  }
}

// ===================== BACKGROUND =====================
// Pre-generate star positions
const STARS=Array.from({length:80},()=>({
  x:Math.random()*CW,y:Math.random()*(GY-60),
  r:Math.random()*1.5+0.3,a:Math.random()*0.6+0.3
}));

// Mountain silhouettes (static shape data, parallax applied via offset)
const MTN1=[
  {pts:[[0,GY],[0,280],[120,200],[200,250],[320,170],[440,230],[560,160],[680,210],[800,155],[920,205],[1024,175],[1024,GY]]},
];
const MTN2=[
  {pts:[[0,GY],[0,310],[90,265],[180,295],[270,250],[400,280],[520,240],[640,265],[760,235],[880,260],[1024,245],[1024,GY]]},
];
// Ruin columns
const COLS=[[80,GY],[200,GY],[380,GY],[600,GY],[820,GY],[960,GY]];

function drawBg(avgX){
  const px=avgX/CW; // 0..1 for parallax

  // Sky gradient
  const sg=ctx.createLinearGradient(0,0,0,GY);
  sg.addColorStop(0,'#06000f');
  sg.addColorStop(0.6,'#0f0028');
  sg.addColorStop(1,'#1a0040');
  ctx.fillStyle=sg;
  ctx.fillRect(0,0,CW,CH);

  // Stars
  for(const s of STARS){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,180,255,${s.a})`;
    ctx.fill();
  }

  // Far mountains (parallax 0.08)
  const o1=(px-0.5)*CW*0.08;
  ctx.fillStyle='#0a0020';
  ctx.beginPath();
  const m1=MTN1[0].pts;
  ctx.moveTo(m1[0][0]+o1,m1[0][1]);
  for(const p of m1) ctx.lineTo(p[0]+o1,p[1]);
  ctx.closePath(); ctx.fill();

  // Near mountains (parallax 0.18)
  const o2=(px-0.5)*CW*0.18;
  ctx.fillStyle='#0d0025';
  const m2=MTN2[0].pts;
  ctx.beginPath();
  ctx.moveTo(m2[0][0]+o2,m2[0][1]);
  for(const p of m2) ctx.lineTo(p[0]+o2,p[1]);
  ctx.closePath(); ctx.fill();

  // Ruin columns (parallax 0.28)
  const o3=(px-0.5)*CW*0.28;
  ctx.fillStyle='#110030';
  for(const [cx] of COLS){
    const rx=cx+o3;
    ctx.fillRect(rx-14,GY-110,28,110);
    ctx.fillRect(rx-20,GY-120,40,14);
    ctx.fillRect(rx-16,GY-175,32,55);
    ctx.fillRect(rx-22,GY-182,44,10);
  }
  // Column glow
  ctx.strokeStyle='rgba(100,40,200,0.15)';
  ctx.lineWidth=1;
  for(const [cx] of COLS){
    const rx=cx+o3;
    ctx.strokeRect(rx-14,GY-175,28,175);
  }

  // Ground
  const gg=ctx.createLinearGradient(0,GY,0,CH);
  gg.addColorStop(0,'#150030');
  gg.addColorStop(1,'#06000f');
  ctx.fillStyle=gg;
  ctx.fillRect(0,GY,CW,CH-GY);

  // Ground glow line
  ctx.save();
  ctx.shadowColor='#9933ff';
  ctx.shadowBlur=14;
  ctx.strokeStyle='#7722cc';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(0,GY); ctx.lineTo(CW,GY);
  ctx.stroke();
  ctx.restore();

  // Grid on floor
  ctx.strokeStyle='rgba(80,20,150,0.18)';
  ctx.lineWidth=1;
  for(let gx=0;gx<CW;gx+=80){
    ctx.beginPath();
    ctx.moveTo(gx,GY); ctx.lineTo(gx+40,CH);
    ctx.stroke();
  }
}

// ===================== COMBAT =====================
function checkHit(attacker,defender){
  if(attacker.hitDone) return;
  const ab=attacker.getAtkBox();
  if(!ab) return;
  const bb=defender.getBodyBox();
  if(ab.x<bb.x+bb.w && ab.x+ab.w>bb.x && ab.y<bb.y+bb.h && ab.y+ab.h>bb.y){
    if(defender.hit(ab.dmg)){
      attacker.hitDone=true;
    }
  }
}

// ===================== HUD =====================
function drawHUD(){
  const bw=300,bh=22,bp=14;

  // P1 HP
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(bp,bp,bw,bh);
  const hp1=p1.hp/p1.maxHp;
  const gc1=ctx.createLinearGradient(bp,0,bp+bw,0);
  gc1.addColorStop(0,'#2255ff');
  gc1.addColorStop(1,'#44aaff');
  ctx.fillStyle=gc1;
  ctx.fillRect(bp,bp,bw*hp1,bh);
  ctx.strokeStyle='#6688ff';
  ctx.lineWidth=1.5;
  ctx.strokeRect(bp,bp,bw,bh);
  ctx.fillStyle='#fff';
  ctx.font='bold 13px Arial';
  ctx.textAlign='left';
  ctx.fillText(CHARS[0].name,bp+6,bp+bh-5);
  ctx.textAlign='right';
  ctx.fillText(Math.ceil(p1.hp),bp+bw-4,bp+bh-5);

  // P2 HP
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(CW-bp-bw,bp,bw,bh);
  const hp2=p2.hp/p2.maxHp;
  const gc2=ctx.createLinearGradient(CW-bp-bw,0,CW-bp,0);
  gc2.addColorStop(0,'#dd44ff');
  gc2.addColorStop(1,'#aa22cc');
  ctx.fillStyle=gc2;
  ctx.fillRect(CW-bp-bw+(bw*(1-hp2)),bp,bw*hp2,bh);
  ctx.strokeStyle='#cc66ff';
  ctx.lineWidth=1.5;
  ctx.strokeRect(CW-bp-bw,bp,bw,bh);
  ctx.fillStyle='#fff';
  ctx.textAlign='right';
  ctx.fillText(CHARS[1].name,CW-bp-6,bp+bh-5);
  ctx.textAlign='left';
  ctx.fillText(Math.ceil(p2.hp),CW-bp-bw+4,bp+bh-5);

  // State debug text
  ctx.fillStyle='rgba(180,180,255,0.5)';
  ctx.font='10px monospace';
  ctx.textAlign='left';
  ctx.fillText(`[${p1.state}] f${p1.fi}`,bp,bp+bh+12);
  ctx.textAlign='right';
  ctx.fillText(`[${p2.state}] f${p2.fi}`,CW-bp,bp+bh+12);

  // Game over
  if(gameOver){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#fff';
    ctx.font='bold 56px Arial';
    ctx.textAlign='center';
    ctx.shadowColor='#aa33ff';
    ctx.shadowBlur=20;
    ctx.fillText(winner+' WINS!',CW/2,CH/2-20);
    ctx.font='22px Arial';
    ctx.shadowBlur=0;
    ctx.fillText('Коснитесь для перезапуска',CW/2,CH/2+30);
    ctx.restore();
  }
}

function drawHitboxes(){
  // Attacker boxes
  for(const c of[p1,p2]){
    const ab=c.getAtkBox();
    if(ab){
      ctx.strokeStyle='rgba(255,50,50,0.7)';
      ctx.lineWidth=2;
      ctx.strokeRect(ab.x,ab.y,ab.w,ab.h);
      ctx.fillStyle='rgba(255,50,50,0.1)';
      ctx.fillRect(ab.x,ab.y,ab.w,ab.h);
    }
    const bb=c.getBodyBox();
    ctx.strokeStyle='rgba(50,255,50,0.5)';
    ctx.lineWidth=1.5;
    ctx.strokeRect(bb.x,bb.y,bb.w,bb.h);
  }
}

// ===================== GAME LOOP =====================
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,0.05);
  last=ts;

  if(!gameOver){
    p1.update(dt,inp.p1,p2);
    p2.update(dt,inp.p2,p1);
    checkHit(p1,p2);
    checkHit(p2,p1);
    if(p1.hp<=0){gameOver=true;winner=CHARS[1].name;}
    if(p2.hp<=0){gameOver=true;winner=CHARS[0].name;}
  }

  const avgX=(p1.x+p2.x)/2;
  drawBg(avgX);
  // Character shadows
  for(const c of[p1,p2]){
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(c.x,GY+2,36,9,0,0,Math.PI*2);
    ctx.fill();
  }
  p1.draw(ctx);
  p2.draw(ctx);
  if(showHitboxes) drawHitboxes();
  drawHUD();

  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{last=ts;loop(ts);});

// ===================== CONTROLS UI =====================
const ui=document.getElementById('ui');

function btn(label,cls,styles,onDown,onUp){
  const el=document.createElement('div');
  el.className='cb '+cls;
  el.textContent=label;
  Object.assign(el.style,styles);
  ui.appendChild(el);
  const dn=e=>{e.preventDefault();el.setPointerCapture(e.pointerId);el.classList.add('active');onDown();};
  const up=e=>{el.classList.remove('active');if(onUp)onUp();};
  el.addEventListener('pointerdown',dn);
  el.addEventListener('pointerup',up);
  el.addEventListener('pointercancel',up);
  return el;
}

function makeControls(inpRef, side){
  const L=side==='left';
  const bs='60px';    // normal button size
  const r1='108px';   // bottom: row 1 (lower)  — safe above home bar
  const r2='178px';   // bottom: row 2 (upper)

  if(L){
    // D-pad
    btn('←','cb dir',{left:'14px', bottom:r1,width:bs,height:bs},()=>inpRef.left=true, ()=>inpRef.left=false);
    btn('→','cb dir',{left:'84px', bottom:r1,width:bs,height:bs},()=>inpRef.right=true,()=>inpRef.right=false);
    btn('↑','cb dir',{left:'49px', bottom:r2,width:bs,height:bs},()=>inpRef.up=true,   ()=>inpRef.up=false);
    // Special (★) — between dpad and attack grid, clearly visible
    btn('★','cb atk-x',{left:'158px',bottom:r1,width:'68px',height:'68px'},()=>inpRef.x=true,()=>inpRef.x=false);
    // Attack grid
    btn('A','cb atk-a',{left:'244px',bottom:r2,width:bs,height:bs},()=>inpRef.a=true,()=>inpRef.a=false);
    btn('B','cb atk-b',{left:'314px',bottom:r2,width:bs,height:bs},()=>inpRef.b=true,()=>inpRef.b=false);
    btn('C','cb atk-c',{left:'244px',bottom:r1,width:bs,height:bs},()=>inpRef.c=true,()=>inpRef.c=false);
    btn('D','cb atk-d',{left:'314px',bottom:r1,width:bs,height:bs},()=>inpRef.d=true,()=>inpRef.d=false);
  } else {
    // D-pad
    btn('→','cb dir',{right:'14px', bottom:r1,width:bs,height:bs},()=>inpRef.right=true,()=>inpRef.right=false);
    btn('←','cb dir',{right:'84px', bottom:r1,width:bs,height:bs},()=>inpRef.left=true, ()=>inpRef.left=false);
    btn('↑','cb dir',{right:'49px', bottom:r2,width:bs,height:bs},()=>inpRef.up=true,   ()=>inpRef.up=false);
    // Special (★)
    btn('★','cb atk-x',{right:'158px',bottom:r1,width:'68px',height:'68px'},()=>inpRef.x=true,()=>inpRef.x=false);
    // Attack grid
    btn('A','cb atk-a',{right:'244px',bottom:r2,width:bs,height:bs},()=>inpRef.a=true,()=>inpRef.a=false);
    btn('B','cb atk-b',{right:'314px',bottom:r2,width:bs,height:bs},()=>inpRef.b=true,()=>inpRef.b=false);
    btn('C','cb atk-c',{right:'244px',bottom:r1,width:bs,height:bs},()=>inpRef.c=true,()=>inpRef.c=false);
    btn('D','cb atk-d',{right:'314px',bottom:r1,width:bs,height:bs},()=>inpRef.d=true,()=>inpRef.d=false);
  }
}

makeControls(inp.p1,'left');
makeControls(inp.p2,'right');

// ===================== DEBUG PANEL =====================
const dbg=document.getElementById('dbg');

function buildDebug(){
  dbg.innerHTML='';
  const l1=document.createElement('div');
  l1.className='dbg-lbl';
  l1.textContent='P1: '+CHARS[0].name;
  dbg.appendChild(l1);
  for(const [k,v] of Object.entries(CHARS[0].anims)){
    const b=document.createElement('div');
    b.className='dbtn';
    b.textContent=k+' ('+v.f.length+'f)';
    b.addEventListener('pointerdown',e=>{e.preventDefault();p1.setState(k);});
    dbg.appendChild(b);
  }
  const l2=document.createElement('div');
  l2.className='dbg-lbl';
  l2.style.marginTop='6px';
  l2.textContent='P2: '+CHARS[1].name;
  dbg.appendChild(l2);
  for(const [k,v] of Object.entries(CHARS[1].anims)){
    const b=document.createElement('div');
    b.className='dbtn p2';
    b.textContent=k+' ('+v.f.length+'f)';
    b.addEventListener('pointerdown',e=>{e.preventDefault();p2.setState(k);});
    dbg.appendChild(b);
  }
  // Hitbox toggle
  const hb=document.createElement('div');
  hb.className='dbtn';
  hb.style.borderColor='#888';
  hb.style.color='#ccc';
  hb.textContent='HITBOXES: OFF';
  hb.addEventListener('click',()=>{
    showHitboxes=!showHitboxes;
    hb.textContent='HITBOXES: '+(showHitboxes?'ON':'OFF');
  });
  dbg.appendChild(hb);
  // Reset
  const rb=document.createElement('div');
  rb.className='dbtn';
  rb.style.borderColor='#884444';
  rb.style.color='#ff8888';
  rb.textContent='RESET';
  rb.addEventListener('click',resetGame);
  dbg.appendChild(rb);
}

function toggleDebug(){
  dbgOpen=!dbgOpen;
  dbg.style.display=dbgOpen?'flex':'none';
  document.getElementById('dbg-toggle').textContent=dbgOpen?'✕ DEBUG':'⚙ DEBUG';
  if(dbgOpen&&!dbg.children.length) buildDebug();
}

  'KeyF':['p1','d'],'KeyG':['p1','x'],

};

  const m=KB[e.code];
  if(m) inp[m[0]][m[1]]=true;
});

  if(m) inp[m[0]][m[1]]=false;
});

// Restart on tap when game over
canvas.addEventListener('click',()=>{
  if(gameOver) resetGame();
});

// ===================== ZOOM LOCK (iOS Safari nuclear) =====================
const _vp = document.querySelector('meta[name=viewport]');
const _vpContent = _vp.content;

function _resetZoom(){
  // Meta toggle trick — forces Safari to snap back to scale=1
  _vp.content = 'width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no';
  requestAnimationFrame(()=>{ _vp.content = _vpContent; });
}

// Block all multi-touch and gesture events
['gesturestart','gesturechange','gestureend'].forEach(ev=>
  document.addEventListener(ev, e=>{ e.preventDefault(); _resetZoom(); }, {passive:false})
);
document.addEventListener('touchmove', e=>{
  if(e.touches.length>1){ e.preventDefault(); _resetZoom(); }
}, {passive:false});
document.addEventListener('touchstart', e=>{
  if(e.touches.length>1){ e.preventDefault(); }
}, {passive:false});

// Double-tap block
let _lastTap=0;
document.addEventListener('touchend', e=>{
  const now=Date.now();
  if(now-_lastTap<320){ e.preventDefault(); _resetZoom(); }
  _lastTap=now;
}, {passive:false});

// visualViewport — detect if zoom slipped through and immediately undo it
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', ()=>{
    if(window.visualViewport.scale > 1.01) _resetZoom();
  });
  window.visualViewport.addEventListener('scroll', ()=>{
    if(window.visualViewport.scale > 1.01) _resetZoom();
  });
}
</script>
