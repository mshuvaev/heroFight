// ===================== BLACK BG REMOVAL =====================
function removeBlackBg(img, threshold){
  threshold = threshold || 40;
  var oc=document.createElement('canvas');
  oc.width=img.naturalWidth||img.width;
  oc.height=img.naturalHeight||img.height;
  var oc2=oc.getContext('2d');
  oc2.drawImage(img,0,0);
  var id=oc2.getImageData(0,0,oc.width,oc.height);
  var d=id.data;
  for(var i=0;i<d.length;i+=4){
    if(d[i]<threshold&&d[i+1]<threshold&&d[i+2]<threshold) d[i+3]=0;
  }
  oc2.putImageData(id,0,0);
  return oc;
}

// ===================== PRELOAD IMAGES (for select screen) =====================
const PREV_IMGS=CHARS.map(function(ch){
  var img=new Image();
  var obj={img:img,rdy:false,canvas:null};
  img.onload=function(){
    obj.rdy=true;
    if(ch.blackBg) obj.canvas=removeBlackBg(img);
  };
  img.src=ch.file;
  return obj;
});

// ===================== CHARACTER CLASS =====================
class Char{
  constructor(def,x,fr){
    this.def=def; this.x=x; this.y=GY;
    this.vx=0; this.vy=0; this.onGround=true;
    this.fr=fr;
    this.hp=100; this.maxHp=100;
    this.state='idle'; this.fi=0; this.ft=0; this.st=0;
    this.hitDone=false; this.inv=0; this.stun=0;
    this.hitFlash=0;
    const ci=CHARS.indexOf(def);
    const pi=PREV_IMGS[ci];
    if(pi&&pi.rdy){
      this.img=pi.img;
      this.cvs=pi.canvas;
      this.rdy=true;
    } else {
      this.img=new Image();
      this.cvs=null;
      this.rdy=false;
      const self=this;
      this.img.onload=function(){
        self.rdy=true;
        if(def.blackBg) self.cvs=removeBlackBg(self.img);
      };
      this.img.src=def.file;
    }
  }
  get anim(){return this.def.anims[this.state]||this.def.anims.idle;}
  get frame(){return this.anim.f[Math.min(this.fi,this.anim.f.length-1)];}
  isAtk(){return !['idle','walk'].includes(this.state);}

  setState(s){
    if(this.state===s)return;
    this.state=s; this.fi=0; this.ft=0; this.st=0; this.hitDone=false;
  }

  update(dt,inp,opp){
    this.fr=this.x<opp.x;
    if(!this.onGround){this.vy+=GRAV*dt;}
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    if(this.y>=GY){
      this.y=GY; this.vy=0; this.onGround=true;
      if(this.state==='jump') this.setState('idle');
    }
    this.x=Math.max(60,Math.min(CW-60,this.x));
    this.inv=Math.max(0,this.inv-dt);
    this.stun=Math.max(0,this.stun-dt);
    this.hitFlash=Math.max(0,this.hitFlash-dt);
    this.st+=dt;
    if(this.stun<=0&&this.hp>0){
      if(!this.isAtk()){
        if(inp.left){this.vx=-WALK; if(this.onGround)this.setState('walk');}
        else if(inp.right){this.vx=WALK; if(this.onGround)this.setState('walk');}
        else{
          this.vx=0;
          if(this.onGround&&this.state==='walk')this.setState('idle');
        }
        if(inp.up&&this.onGround){
          this.vy=JUMP_VY; this.onGround=false; this.setState('jump');
          inp.up=false;
        }
        const am=this.def.attackMap;
        for(const k of['a','b','c','d','x']){
          if(inp[k]){
            inp[k]=false;
            const s=am[k];
            if(s&&this.def.anims[s]){this.vx=0;this.setState(s);}
            break;
          }
        }
      } else {
        this.vx*=0.85;
      }
    } else if(this.stun>0){this.vx*=0.7;}

    const a=this.anim;
    this.ft+=dt;
    const fd=1/a.fps;
    while(this.ft>=fd){
      this.ft-=fd; this.fi++;
      if(this.fi>=a.f.length){
        if(a.loop){this.fi=0;}
        else{this.fi=a.f.length-1; if(this.isAtk())this.setState('idle');}
      }
    }
  }

  getAtkBox(){
    if(!this.isAtk()) return null;
    const a=this.anim;
    if(!a.atk) return null;
    const n=a.f.length;
    if(n>1&&(this.fi<1||this.fi>n-2)) return null;
    const {reach,oy,oh,dmg}=a.atk;
    const bx=this.fr?this.x:this.x-reach;
    return {x:bx,y:this.y+oy,w:reach,h:oh,dmg};
  }

  getBodyBox(){
    return {x:this.x-this.def.bw/2,y:this.y-this.def.bh,w:this.def.bw,h:this.def.bh};
  }

  hit(dmg){
    if(this.inv>0) return false;
    this.hp=Math.max(0,this.hp-dmg);
    this.inv=0.45; this.stun=0.22;
    this.hitFlash=0.12;
    return true;
  }

  draw(ctx){
    if(!this.rdy) return;
    const src=this.cvs||this.img;
    const f=this.frame, sc=this.def.sc;
    const a=this.anim;
    let dw=f.w*sc, dh=f.h*sc;
    if(a.maxDW&&dw>a.maxDW){const r=a.maxDW/dw; dw=a.maxDW; dh*=r;}
    const dx=this.x-dw/2, dy=this.y-dh;
    ctx.save();
    if(!this.fr){
      ctx.translate(this.x*2,0);
      ctx.scale(-1,1);
    }
    if(this.hitFlash>0) ctx.filter='brightness(3) saturate(0)';
    if(this.inv>0&&Math.floor(this.inv*10)%2===0) ctx.globalAlpha=0.4;
    ctx.drawImage(src,f.x,f.y,f.w,f.h,dx,dy,dw,dh);
    ctx.restore();
  }
}

function rRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawCharCard(ch,x,y,sel,pi){
  // Card bg
  ctx.fillStyle=sel?'rgba(55,15,110,0.95)':'rgba(14,0,32,0.78)';
  rRect(x,y,SEL_CARD_W,SEL_CARD_H,10);
  ctx.fill();
  // Border
  ctx.strokeStyle=sel?ch.color:'rgba(80,40,140,0.45)';
  ctx.lineWidth=sel?3:1.5;
  rRect(x,y,SEL_CARD_W,SEL_CARD_H,10);
  ctx.stroke();
  // Sprite preview
  const preW=65,preH=SEL_CARD_H-12;
  if(pi&&pi.rdy){
    const f=ch.anims.idle.f[0];
    const sc=Math.min(preW/f.w,preH/f.h);
    const dw=f.w*sc,dh=f.h*sc;
    const src=pi.canvas||pi.img;
    ctx.drawImage(src,f.x,f.y,f.w,f.h, x+8, y+(SEL_CARD_H-dh)/2, dw,dh);
  }
  // Color dot
  ctx.fillStyle=ch.color;
  ctx.beginPath();
  ctx.arc(x+SEL_CARD_W-16,y+17,7,0,Math.PI*2);
  ctx.fill();
  // Name
  ctx.fillStyle=sel?'#ffffff':'#aabbdd';
  ctx.font=(sel?'bold ':'')+' 21px Arial';
  ctx.textAlign='left';
  ctx.fillText(ch.name,x+82,y+SEL_CARD_H/2+4);
  // Check
  if(sel){
    ctx.fillStyle='#88ff88';
    ctx.font='bold 20px Arial';
    ctx.textAlign='right';
    ctx.fillText('✓',x+SEL_CARD_W-28,y+SEL_CARD_H/2+6);
  }
}

function drawSelectScreen(){
  // Bg
  ctx.fillStyle='#06000f';
  ctx.fillRect(0,0,CW,CH);
  for(const s of STARS){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,180,255,${s.a})`;
    ctx.fill();
  }
  // Glowing title
  ctx.save();
  ctx.shadowColor='#9933ff';
  ctx.shadowBlur=18;
  ctx.fillStyle='#ddaaff';
  ctx.font='bold 30px Arial';
  ctx.textAlign='center';
  ctx.fillText('ВЫБОР ПЕРСОНАЖА',CW/2,48);
  ctx.restore();
  // Divider
  ctx.strokeStyle='rgba(140,50,255,0.28)';
  ctx.lineWidth=1.5;
  ctx.setLineDash([7,7]);
  ctx.beginPath();
  ctx.moveTo(CW/2,62); ctx.lineTo(CW/2,CH-90);
  ctx.stroke();
  ctx.setLineDash([]);
  // Player labels
  ctx.font='bold 17px Arial';
  ctx.textAlign='center';
  ctx.fillStyle='#4488ff';
  ctx.fillText('ИГРОК 1',CW/4,82);
  ctx.fillStyle='#cc44ff';
  ctx.fillText('ИГРОК 2',CW*3/4,82);

  const p1cx=CW/4-SEL_CARD_W/2;
  const p2cx=CW*3/4-SEL_CARD_W/2;

  for(let ci=0;ci<CHARS.length;ci++){
    const cy=SEL_START_Y+ci*(SEL_CARD_H+SEL_CARD_GAP);
    drawCharCard(CHARS[ci],p1cx,cy,selP1===ci,PREV_IMGS[ci]);
    drawCharCard(CHARS[ci],p2cx,cy,selP2===ci,PREV_IMGS[ci]);
  }

  // FIGHT button
  const b=SEL_BTN;
  const grd=ctx.createLinearGradient(b.x,b.y,b.x+b.w,b.y);
  grd.addColorStop(0,'rgba(100,0,180,0.92)');
  grd.addColorStop(1,'rgba(180,0,90,0.92)');
  ctx.fillStyle=grd;
  rRect(b.x,b.y,b.w,b.h,14);
  ctx.fill();
  ctx.save();
  ctx.shadowColor='#ff55ff';
  ctx.shadowBlur=22;
  ctx.strokeStyle='#ff88ff';
  ctx.lineWidth=2.5;
  rRect(b.x,b.y,b.w,b.h,14);
  ctx.stroke();
  ctx.fillStyle='#ffffff';
  ctx.font='bold 26px Arial';
  ctx.textAlign='center';
  ctx.fillText('⚔ БОЙ!',CW/2,b.y+38);
  ctx.restore();
}

function startFight(){
  phase='fight';
  p1=new Char(CHARS[selP1],220,true);
  p2=new Char(CHARS[selP2],800,false);
  gameOver=false; winner='';
  document.getElementById('ui').style.display='';
  document.getElementById('dbg-toggle').style.display='';
  if(dbgOpen) buildDebug();
}

function goToSelect(){
  phase='select';
  gameOver=false; winner='';
  document.getElementById('ui').style.display='none';
  document.getElementById('dbg-toggle').style.display='none';
  if(dbgOpen){
    dbgOpen=false;
    document.getElementById('dbg').style.display='none';
    document.getElementById('dbg-toggle').textContent='⚙ DEBUG';
  }
}

// ===================== BACKGROUND =====================
const STARS=Array.from({length:80},()=>({
  x:Math.random()*CW,y:Math.random()*(GY-60),
  r:Math.random()*1.5+0.3,a:Math.random()*0.6+0.3
}));
const MTN1=[{pts:[[0,GY],[0,280],[120,200],[200,250],[320,170],[440,230],[560,160],[680,210],[800,155],[920,205],[1024,175],[1024,GY]]}];
const MTN2=[{pts:[[0,GY],[0,310],[90,265],[180,295],[270,250],[400,280],[520,240],[640,265],[760,235],[880,260],[1024,245],[1024,GY]]}];
const COLS=[[80,GY],[200,GY],[380,GY],[600,GY],[820,GY],[960,GY]];

function drawBg(avgX){
  const px=avgX/CW;
  const sg=ctx.createLinearGradient(0,0,0,GY);
  sg.addColorStop(0,'#06000f'); sg.addColorStop(0.6,'#0f0028'); sg.addColorStop(1,'#1a0040');
  ctx.fillStyle=sg; ctx.fillRect(0,0,CW,CH);
  for(const s of STARS){
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,180,255,${s.a})`; ctx.fill();
  }
  const o1=(px-0.5)*CW*0.08;
  ctx.fillStyle='#0a0020'; ctx.beginPath();
  const m1=MTN1[0].pts; ctx.moveTo(m1[0][0]+o1,m1[0][1]);
  for(const p of m1) ctx.lineTo(p[0]+o1,p[1]);
  ctx.closePath(); ctx.fill();
  const o2=(px-0.5)*CW*0.18;
  ctx.fillStyle='#0d0025';
  const m2=MTN2[0].pts; ctx.beginPath(); ctx.moveTo(m2[0][0]+o2,m2[0][1]);
  for(const p of m2) ctx.lineTo(p[0]+o2,p[1]);
  ctx.closePath(); ctx.fill();
  const o3=(px-0.5)*CW*0.28;
  ctx.fillStyle='#110030';
  for(const [cx] of COLS){
    const rx=cx+o3;
    ctx.fillRect(rx-14,GY-110,28,110); ctx.fillRect(rx-20,GY-120,40,14);
    ctx.fillRect(rx-16,GY-175,32,55); ctx.fillRect(rx-22,GY-182,44,10);
  }
  ctx.strokeStyle='rgba(100,40,200,0.15)'; ctx.lineWidth=1;
  for(const [cx] of COLS){const rx=cx+o3; ctx.strokeRect(rx-14,GY-175,28,175);}
  const gg=ctx.createLinearGradient(0,GY,0,CH);
  gg.addColorStop(0,'#150030'); gg.addColorStop(1,'#06000f');
  ctx.fillStyle=gg; ctx.fillRect(0,GY,CW,CH-GY);
  ctx.save();
  ctx.shadowColor='#9933ff'; ctx.shadowBlur=14;
  ctx.strokeStyle='#7722cc'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(CW,GY); ctx.stroke();
  ctx.restore();
  ctx.strokeStyle='rgba(80,20,150,0.18)'; ctx.lineWidth=1;
  for(let gx=0;gx<CW;gx+=80){
    ctx.beginPath(); ctx.moveTo(gx,GY); ctx.lineTo(gx+40,CH); ctx.stroke();
  }
}

// ===================== COMBAT =====================
function checkHit(attacker,defender){
  if(attacker.hitDone) return;
  const ab=attacker.getAtkBox();
  if(!ab) return;
  const bb=defender.getBodyBox();
  if(ab.x<bb.x+bb.w&&ab.x+ab.w>bb.x&&ab.y<bb.y+bb.h&&ab.y+ab.h>bb.y){
    if(defender.hit(ab.dmg)) attacker.hitDone=true;
  }
}

// ===================== HUD =====================
function drawHUD(){
  const bw=300,bh=22,bp=14;
  // P1
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(bp,bp,bw,bh);
  const hp1=p1.hp/p1.maxHp;
  const gc1=ctx.createLinearGradient(bp,0,bp+bw,0);
  gc1.addColorStop(0,p1.def.color); gc1.addColorStop(1,'#88ccff');
  ctx.fillStyle=gc1; ctx.fillRect(bp,bp,bw*hp1,bh);
  ctx.strokeStyle=p1.def.color; ctx.lineWidth=1.5; ctx.strokeRect(bp,bp,bw,bh);
  ctx.fillStyle='#fff'; ctx.font='bold 13px Arial';
  ctx.textAlign='left'; ctx.fillText(p1.def.name,bp+6,bp+bh-5);
  ctx.textAlign='right'; ctx.fillText(Math.ceil(p1.hp),bp+bw-4,bp+bh-5);
  // P2
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(CW-bp-bw,bp,bw,bh);
  const hp2=p2.hp/p2.maxHp;
  const gc2=ctx.createLinearGradient(CW-bp-bw,0,CW-bp,0);
  gc2.addColorStop(0,p2.def.color); gc2.addColorStop(1,'#ffaaee');
  ctx.fillStyle=gc2;
  ctx.fillRect(CW-bp-bw+(bw*(1-hp2)),bp,bw*hp2,bh);
  ctx.strokeStyle=p2.def.color; ctx.lineWidth=1.5; ctx.strokeRect(CW-bp-bw,bp,bw,bh);
  ctx.fillStyle='#fff';
  ctx.textAlign='right'; ctx.fillText(p2.def.name,CW-bp-6,bp+bh-5);
  ctx.textAlign='left'; ctx.fillText(Math.ceil(p2.hp),CW-bp-bw+4,bp+bh-5);
  // State debug
  ctx.fillStyle='rgba(180,180,255,0.5)'; ctx.font='10px monospace';
  ctx.textAlign='left'; ctx.fillText(`[${p1.state}] f${p1.fi}`,bp,bp+bh+12);
  ctx.textAlign='right'; ctx.fillText(`[${p2.state}] f${p2.fi}`,CW-bp,bp+bh+12);
  // Game over
  if(gameOver){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#fff'; ctx.font='bold 56px Arial'; ctx.textAlign='center';
    ctx.shadowColor='#aa33ff'; ctx.shadowBlur=20;
    ctx.fillText(winner+' WINS!',CW/2,CH/2-30);
    ctx.font='22px Arial'; ctx.shadowBlur=0;
    ctx.fillText('Коснитесь для выбора персонажей',CW/2,CH/2+25);
    ctx.restore();
  }
}

function drawHitboxes(){
  for(const c of[p1,p2]){
    const ab=c.getAtkBox();
    if(ab){
      ctx.strokeStyle='rgba(255,50,50,0.7)'; ctx.lineWidth=2;
      ctx.strokeRect(ab.x,ab.y,ab.w,ab.h);
      ctx.fillStyle='rgba(255,50,50,0.1)'; ctx.fillRect(ab.x,ab.y,ab.w,ab.h);
    }
    const bb=c.getBodyBox();
    ctx.strokeStyle='rgba(50,255,50,0.5)'; ctx.lineWidth=1.5;
    ctx.strokeRect(bb.x,bb.y,bb.w,bb.h);
  }
}

// ===================== GAME LOOP =====================
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,0.05);
  last=ts;

  if(phase==='select'){
    drawSelectScreen();
  } else {
    if(!gameOver){
      p1.update(dt,inp.p1,p2);
      p2.update(dt,inp.p2,p1);
      checkHit(p1,p2);
      checkHit(p2,p1);
      if(p1.hp<=0){gameOver=true;winner=p2.def.name;}
      if(p2.hp<=0){gameOver=true;winner=p1.def.name;}
    }
    const avgX=(p1.x+p2.x)/2;
    drawBg(avgX);
    for(const c of[p1,p2]){
      ctx.fillStyle='rgba(0,0,0,0.35)';
      ctx.beginPath(); ctx.ellipse(c.x,GY+2,36,9,0,0,Math.PI*2); ctx.fill();
    }
    p1.draw(ctx); p2.draw(ctx);
    if(showHitboxes) drawHitboxes();
    drawHUD();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{last=ts;loop(ts);});

// ===================== CONTROLS UI =====================
const ui=document.getElementById('ui');

function btn(label,cls,styles,onDown,onUp){
  const el=document.createElement('div');
  el.className='cb '+cls;
  el.textContent=label;
  Object.assign(el.style,styles);
  ui.appendChild(el);
  const dn=e=>{e.preventDefault();el.setPointerCapture(e.pointerId);el.classList.add('active');onDown();};
  const up=e=>{el.classList.remove('active');if(onUp)onUp();};
  el.addEventListener('pointerdown',dn);
  el.addEventListener('pointerup',up);
  el.addEventListener('pointercancel',up);
  return el;
}

function makeControls(inpRef,side){
  const L=side==='left';
  const bs='60px';
  const r1='108px';
  const r2='178px';
  if(L){
    btn('←','cb dir',{left:'14px',bottom:r1,width:bs,height:bs},()=>inpRef.left=true,()=>inpRef.left=false);
    btn('→','cb dir',{left:'84px',bottom:r1,width:bs,height:bs},()=>inpRef.right=true,()=>inpRef.right=false);
    btn('↑','cb dir',{left:'49px',bottom:r2,width:bs,height:bs},()=>inpRef.up=true,()=>inpRef.up=false);
    btn('★','cb atk-x',{left:'158px',bottom:r1,width:'68px',height:'68px'},()=>inpRef.x=true,()=>inpRef.x=false);
    btn('A','cb atk-a',{left:'244px',bottom:r2,width:bs,height:bs},()=>inpRef.a=true,()=>inpRef.a=false);
    btn('B','cb atk-b',{left:'314px',bottom:r2,width:bs,height:bs},()=>inpRef.b=true,()=>inpRef.b=false);
    btn('C','cb atk-c',{left:'244px',bottom:r1,width:bs,height:bs},()=>inpRef.c=true,()=>inpRef.c=false);
    btn('D','cb atk-d',{left:'314px',bottom:r1,width:bs,height:bs},()=>inpRef.d=true,()=>inpRef.d=false);
  } else {
    btn('→','cb dir',{right:'14px',bottom:r1,width:bs,height:bs},()=>inpRef.right=true,()=>inpRef.right=false);
    btn('←','cb dir',{right:'84px',bottom:r1,width:bs,height:bs},()=>inpRef.left=true,()=>inpRef.left=false);
    btn('↑','cb dir',{right:'49px',bottom:r2,width:bs,height:bs},()=>inpRef.up=true,()=>inpRef.up=false);
    btn('★','cb atk-x',{right:'158px',bottom:r1,width:'68px',height:'68px'},()=>inpRef.x=true,()=>inpRef.x=false);
    btn('A','cb atk-a',{right:'244px',bottom:r2,width:bs,height:bs},()=>inpRef.a=true,()=>inpRef.a=false);
    btn('B','cb atk-b',{right:'314px',bottom:r2,width:bs,height:bs},()=>inpRef.b=true,()=>inpRef.b=false);
    btn('C','cb atk-c',{right:'244px',bottom:r1,width:bs,height:bs},()=>inpRef.c=true,()=>inpRef.c=false);
    btn('D','cb atk-d',{right:'314px',bottom:r1,width:bs,height:bs},()=>inpRef.d=true,()=>inpRef.d=false);
  }
}

makeControls(inp.p1,'left');
makeControls(inp.p2,'right');

// ===================== DEBUG PANEL =====================
const dbg=document.getElementById('dbg');

function buildDebug(){
  if(!p1||!p2) return;
  dbg.innerHTML='';
  const l1=document.createElement('div');
  l1.className='dbg-lbl'; l1.textContent='P1: '+p1.def.name; dbg.appendChild(l1);
  for(const [k,v] of Object.entries(p1.def.anims)){
    const b=document.createElement('div'); b.className='dbtn';
    b.textContent=k+' ('+v.f.length+'f)';
    b.addEventListener('pointerdown',e=>{e.preventDefault();p1.setState(k);});
    dbg.appendChild(b);
  }
  const l2=document.createElement('div');
  l2.className='dbg-lbl'; l2.style.marginTop='6px'; l2.textContent='P2: '+p2.def.name; dbg.appendChild(l2);
  for(const [k,v] of Object.entries(p2.def.anims)){
    const b=document.createElement('div'); b.className='dbtn p2';
    b.textContent=k+' ('+v.f.length+'f)';
    b.addEventListener('pointerdown',e=>{e.preventDefault();p2.setState(k);});
    dbg.appendChild(b);
  }
  const hb=document.createElement('div');
  hb.className='dbtn'; hb.style.borderColor='#888'; hb.style.color='#ccc';
  hb.textContent='HITBOXES: OFF';
  hb.addEventListener('click',()=>{
    showHitboxes=!showHitboxes;
    hb.textContent='HITBOXES: '+(showHitboxes?'ON':'OFF');
  });
  dbg.appendChild(hb);
  const rb=document.createElement('div');
  rb.className='dbtn'; rb.style.borderColor='#884444'; rb.style.color='#ff8888';
  rb.textContent='ВЫБОР';
  rb.addEventListener('click',goToSelect);
  dbg.appendChild(rb);
}

function toggleDebug(){
  dbgOpen=!dbgOpen;
  dbg.style.display=dbgOpen?'flex':'none';
  document.getElementById('dbg-toggle').textContent=dbgOpen?'✕ DEBUG':'⚙ DEBUG';
  if(dbgOpen) buildDebug();
}

// ===================== SELECT SCREEN TOUCH =====================
canvas.addEventListener('pointerdown',function(e){
  if(phase==='select'){
    const rect=canvas.getBoundingClientRect();
    const sx=(e.clientX-rect.left)*(CW/rect.width);
    const sy=(e.clientY-rect.top)*(CH/rect.height);
    // FIGHT button
    const b=SEL_BTN;
    if(sx>=b.x&&sx<=b.x+b.w&&sy>=b.y&&sy<=b.y+b.h){
      startFight(); return;
    }
    // Character cards
    const p1cx=CW/4-SEL_CARD_W/2;
    const p2cx=CW*3/4-SEL_CARD_W/2;
    for(let ci=0;ci<CHARS.length;ci++){
      const cy=SEL_START_Y+ci*(SEL_CARD_H+SEL_CARD_GAP);
      if(sx>=p1cx&&sx<=p1cx+SEL_CARD_W&&sy>=cy&&sy<=cy+SEL_CARD_H){selP1=ci;return;}
      if(sx>=p2cx&&sx<=p2cx+SEL_CARD_W&&sy>=cy&&sy<=cy+SEL_CARD_H){selP2=ci;return;}
    }
  } else {
    if(gameOver) goToSelect();
  }
});

// ===================== KEYBOARD =====================
const KB={
  'KeyA':['p1','left'],'KeyD':['p1','right'],'KeyW':['p1','up'],
  'KeyQ':['p1','a'],'KeyE':['p1','b'],'KeyR':['p1','c'],
  'KeyF':['p1','d'],'KeyG':['p1','x'],
  'ArrowLeft':['p2','left'],'ArrowRight':['p2','right'],'ArrowUp':['p2','up'],
  'KeyU':['p2','a'],'KeyI':['p2','b'],'KeyO':['p2','c'],
  'KeyP':['p2','d'],'BracketRight':['p2','x'],
};
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&phase==='select'){startFight();return;}
  const m=KB[e.code];
  if(m) inp[m[0]][m[1]]=true;
});
document.addEventListener('keyup',e=>{
  const m=KB[e.code];
  if(m) inp[m[0]][m[1]]=false;
});

// ===================== ZOOM LOCK =====================
const _vp=document.querySelector('meta[name=viewport]');
const _vpContent=_vp.content;
const _wrap=document.getElementById('wrap');

function _lockToViewport(){
  const vv=window.visualViewport;
  if(!vv) return;
  _wrap.style.position='fixed';
  _wrap.style.left=vv.offsetLeft+'px';
  _wrap.style.top=vv.offsetTop+'px';
  _wrap.style.width=vv.width+'px';
  _wrap.style.height=vv.height+'px';
  if(vv.scale>1.02){
    _vp.content='width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no';
    setTimeout(()=>{_vp.content=_vpContent;},80);
  }
}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',_lockToViewport);
  window.visualViewport.addEventListener('scroll',_lockToViewport);
  _lockToViewport();
}
['gesturestart','gesturechange','gestureend'].forEach(ev=>
  document.addEventListener(ev,e=>e.preventDefault(),{passive:false})
);
document.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
document.addEventListener('touchstart',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
let _lastTap=0;
document.addEventListener('touchend',e=>{
  const now=Date.now();
  if(now-_lastTap<300)e.preventDefault();
  _lastTap=now;
},{passive:false});
</script>
